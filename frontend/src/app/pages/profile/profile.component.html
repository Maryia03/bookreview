<div class="profile-container" *ngIf="user">
  <div class="profile-card">
    <img class="avatar" [src]="user.avatarUrl || 'assets/default-avatar.png'" />
    <h2>{{ user.username }}</h2>
    <p>{{ user.email }}</p>
    <button class="edit-btn" (click)="editing = true">
      ✏️ Edit profile
    </button>
    <div *ngIf="user.blocked" class="blocked">
      🚫 Your account has been blocked
    </div>
  </div>

  <div *ngIf="editing" class="edit-form">
    <input [(ngModel)]="user.username" placeholder="Username" />
    <input [(ngModel)]="user.avatarUrl" placeholder="Avatar URL" />

    <div class="buttons">
      <button (click)="saveProfile()">Save</button>
      <button (click)="editing = false">Cancel</button>
    </div>
  </div>

  <div class="section">
    <h3>⭐ Rated books</h3>
    <div *ngFor="let rating of ratedBooks" class="item">
      <a [routerLink]="['/book', rating.bookId]">
        {{ rating.bookTitle }}
      </a>
       {{ rating.value }}/10
    </div>
  </div>

  <div class="section">
    <h3>💬 Your comments</h3>
    <div class="list">
      <div *ngFor="let comment of comments" class="item">
        <div class="text-container">
          <a [routerLink]="['/book', comment.bookId]">{{ comment.bookTitle }}</a>
          <p>"{{ comment.content }}"</p>
        </div>
        <button (click)="deleteComment(comment.id)">Delete</button>
      </div>
      </div>
    </div>
  </div>
